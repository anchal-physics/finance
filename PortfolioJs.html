<script>
"use strict";
// =====================  Portfolio stats pages  =====================
// Config-driven: getPortfolioList() (server) defines which portfolios exist;
// pfInit() builds a tab + page for each. Reuses CoreJs/InvestmentJs helpers
// (invText, invPolar, invDonutPath, invApplySvg, invFmt*, serializeSvg,
// export*, PALETTES). Each stock gets a stable color (by value-sorted index)
// used consistently across the pie and both bar charts.

var PF = {};          // key -> { stats, built, loaded }

function pfPalette() { return PALETTES['nested'] || PALETTES['cat10']; }
function pfColor(i) { var p = pfPalette(); return p[i % p.length]; }
function pfIsDark(c) { return (typeof invIsDark === 'function') ? invIsDark(c) : false; }

// ---------- Panel 1: pie of holdings by value ----------
function pfBuildPie(stats) {
  var W = 620, H = 600, cx = 310, cy = 312, rOut = 250, rIn = 122;
  var parts = [], labels = [];
  parts.push(invText(cx, 28, stats.label + ' — Holdings by value', 20, '#1f1f1f', 'middle', 700));
  var items = stats.stocks.filter(function (s) { return s.value > 0; });
  var total = items.reduce(function (a, s) { return a + s.value; }, 0);
  if (!total) { parts.push(invText(cx, cy, 'No holdings.', 15, '#999', 'middle', 400)); return { width: W, height: H, inner: parts.join('') }; }
  var TWO_PI = Math.PI * 2, cursor = 0;
  items.forEach(function (s) {
    var a0 = cursor, a1 = cursor + (s.value / total) * TWO_PI, mid = (a0 + a1) / 2; cursor = a1;
    var fill = pfColor(s.colorIndex);
    var tip = s.ticker + '  ' + invFmtMoney(s.value) + '  (' + invFmtPct(s.value / total, 1) + ')';
    parts.push('<path d="' + invDonutPath(cx, cy, rIn, rOut, a0, a1) + '" fill="' + fill +
               '" stroke="#fff" stroke-width="1"><title>' + escapeHtml(tip) + '</title></path>');
    if ((a1 - a0) > 0.11) {
      var p = invPolar(cx, cy, (rIn + rOut) / 2, mid), col = pfIsDark(fill) ? '#fff' : '#222';
      labels.push(invText(p[0], p[1] - 1, s.ticker, 11, col, 'middle', 700));
      labels.push(invText(p[0], p[1] + 11, invFmtPct(s.value / total, 0), 9.5, col, 'middle', 400));
    }
  });
  labels.push(invText(cx, cy - 4, invFmtMoney(total), 20, '#1f1f1f', 'middle', 700));
  labels.push(invText(cx, cy + 15, 'total value', 11, '#888', 'middle', 400));
  return { width: W, height: H, inner: parts.join('') + labels.join('') };
}

function pfStatsHtml(stats) {
  var t = stats.totals, up = t.profitDollar >= 0, col = up ? '#1e8e3e' : '#c5221f', sign = up ? '+' : '';
  return '<div class="pf-stat"><div class="pf-stat-label">Total asset value</div>' +
           '<div class="pf-stat-num">' + invFmtMoney(t.value) + '</div></div>' +
         '<div class="pf-stat"><div class="pf-stat-label">Total profit</div>' +
           '<div class="pf-stat-num" style="color:' + col + '">' + sign + invFmtMoney(t.profitDollar) + '</div></div>' +
         '<div class="pf-stat"><div class="pf-stat-label">Total return</div>' +
           '<div class="pf-stat-num" style="color:' + col + '">' + sign + invFmtPct(t.profitPct, 2) + '</div></div>' +
         '<div class="pf-stat-sub">Cost basis ' + invFmtMoney(t.cost) + ' · ' + stats.stocks.length + ' holdings</div>';
}

// rotated ticker label under the plot
function pfXLabel(cx, yBase, ticker) {
  return '<text x="' + cx.toFixed(1) + '" y="' + yBase + '" font-family=\'' + INV_FONT +
         '\' font-size="10" fill="#555" text-anchor="end" transform="rotate(-45 ' + cx.toFixed(1) + ' ' + yBase + ')">' +
         escapeHtml(ticker) + '</text>';
}

// ---------- Trailing-change markers (distinct single-line styles, one color) ----------
// Progression short→long: dotted · dashed · dash-dot · long-dash · solid (1y).
var PF_PERIODS = [
  { key: 'w1',  label: '1w',  style: 'dot' },
  { key: 'w4',  label: '4w',  style: 'dash' },
  { key: 'w12', label: '12w', style: 'dashdot' },
  { key: 'm6',  label: '6m',  style: 'longdash' },
  { key: 'y1',  label: '1y',  style: 'solid' }
];
function pfMarkerDash(style) {
  if (style === 'dot')      return '1.5,3';
  if (style === 'dash')     return '5,3';
  if (style === 'dashdot')  return '7,3,1.5,3';
  if (style === 'longdash') return '11,4';
  return ''; // solid
}
// Single charcoal line with a white halo so it reads on any stock color.
function pfMarker(xc, y, hw, style, tip) {
  var x1 = (xc - hw).toFixed(1), x2 = (xc + hw).toFixed(1), yy = y.toFixed(1), dash = pfMarkerDash(style);
  var out = '<line x1="' + x1 + '" y1="' + yy + '" x2="' + x2 + '" y2="' + yy + '" stroke="#fff" stroke-width="3.2" stroke-linecap="round"></line>' +
            '<line x1="' + x1 + '" y1="' + yy + '" x2="' + x2 + '" y2="' + yy + '" stroke="#202124" stroke-width="1.7"' +
            (dash ? ' stroke-dasharray="' + dash + '"' : '') + ' stroke-linecap="round"></line>';
  if (tip) out += '<rect x="' + x1 + '" y="' + (y - 4).toFixed(1) + '" width="' + (hw * 2).toFixed(1) + '" height="8" fill="transparent" data-tip="' + escapeHtml(tip) + '"></rect>';
  return out;
}

// Nice ticks every 10% from 0 out to the data range (both bounds rounded to 10%).
function pfPctTicks(lo, hi) {
  var step = 0.10;
  var min = Math.min(0, Math.floor((lo - 1e-9) / step) * step);
  var max = Math.max(0, Math.ceil((hi + 1e-9) / step) * step);
  if (max <= min) max = min + step;
  var ticks = [];
  for (var v = min; v <= max + 1e-9; v += step) ticks.push(Math.round(v / step) * step);
  return { min: min, max: max, ticks: ticks };
}
// Dual axis: % ticks every 10% (drives gridlines); $ axis aligned so $0 sits on
// the %0 gridline and it covers the $ data. Returns both ranges + the % ticks.
function pfDualAxis(pctLo, pctHi, dolLo, dolHi) {
  var t = pfPctTicks(pctLo, pctHi), pMin = t.min, pMax = t.max;
  var zf = (pMax - 0) / (pMax - pMin);           // fraction from top down to zero
  var dHi = Math.max(0, dolHi), dLo = Math.min(0, dolLo), dMax, dMin;
  if (zf >= 1 - 1e-9) { dMin = 0; dMax = dHi || 1; }
  else if (zf <= 1e-9) { dMax = 0; dMin = dLo || -1; }
  else { var a = Math.max(dHi, (-dLo) * zf / (1 - zf)); if (a <= 0) a = 1; dMax = a; dMin = -a * (1 - zf) / zf; }
  return { pMin: pMin, pMax: pMax, ticks: t.ticks, dMin: dMin, dMax: dMax };
}

// ---------- Panel 2: return % per holding, with trailing-change markers ----------
function pfBuildProfitBars(stats) {
  var items = stats.stocks.filter(function (s) { return s.cost > 0; });
  var W = Math.max(760, 90 + items.length * 48), H = 820, padL = 64, padR = 28, padT = 78, padB = 100;
  var plotW = W - padL - padR, plotH = H - padT - padB;
  var vals = [];
  items.forEach(function (s) {
    vals.push(s.pctProfit);
    PF_PERIODS.forEach(function (p) { if (s.changes && s.changes[p.key] != null) vals.push(s.changes[p.key]); });
  });
  var ax = pfPctTicks(Math.min.apply(null, vals.concat([0])), Math.max.apply(null, vals.concat([0])));
  var scaleY = function (v) { return padT + plotH * (ax.max - v) / (ax.max - ax.min); };
  var parts = [];
  parts.push(invText(W / 2, 26, stats.label + ' — Return % by holding', 19, '#1f1f1f', 'middle', 700));
  // gridlines + left-axis % ticks every 10%
  ax.ticks.forEach(function (tk) {
    var y = scaleY(tk), zero = Math.abs(tk) < 1e-9;
    parts.push('<line x1="' + padL + '" y1="' + y.toFixed(1) + '" x2="' + (W - padR) + '" y2="' + y.toFixed(1) + '" stroke="' + (zero ? '#bbb' : '#ededed') + '" stroke-width="1"></line>');
    parts.push(invText(padL - 6, y + 3.5, invFmtPct(tk, 0), 10, '#888', 'end', 400));
  });
  // marker-style legend (the only place markers are labelled)
  var lx = padL, ly = 48;
  PF_PERIODS.forEach(function (p) {
    parts.push(pfMarker(lx + 13, ly, 13, p.style, ''));
    parts.push(invText(lx + 31, ly + 4, p.label, 11, '#555', 'start', 400));
    lx += 66;
  });
  parts.push(invText(W - padR, ly + 4, 'bar = total return', 11, '#999', 'end', 400));
  var slot = plotW / items.length, bw = Math.min(36, slot * 0.7);
  items.forEach(function (s, i) {
    var v = s.pctProfit, cxc = padL + slot * i + slot / 2, x = cxc - bw / 2;
    var yTop = scaleY(Math.max(0, v)), yBot = scaleY(Math.min(0, v)), h = Math.max(1, yBot - yTop);
    var fill = pfColor(s.colorIndex), tip = s.ticker + ': ' + invFmtPct(v, 1);
    parts.push('<rect x="' + x.toFixed(1) + '" y="' + yTop.toFixed(1) + '" width="' + bw.toFixed(1) + '" height="' + h.toFixed(1) +
               '" rx="2" fill="' + fill + '" data-tip="' + escapeHtml(tip) + '"></rect>');
    parts.push(pfXLabel(cxc, H - padB + 14, s.ticker));
    var hw = bw / 2 + 4;
    PF_PERIODS.forEach(function (p) {
      var cv = s.changes ? s.changes[p.key] : null;
      if (cv == null) return;
      parts.push(pfMarker(cxc, scaleY(cv), hw, p.style, s.ticker + ' ' + p.label + ': ' + invFmtPct(cv, 1)));
    });
  });
  return { width: W, height: H, inner: parts.join('') };
}

// ---------- Panel 3: LT capital-gain profit, $ (left axis) + % (right axis) ----------
function pfBuildLtBars(stats) {
  var items = stats.stocks.filter(function (s) { return s.hasLtProfit; });
  var W = Math.max(760, 110 + items.length * 56), H = 820, padL = 82, padR = 82, padT = 66, padB = 100;
  var plotW = W - padL - padR, plotH = H - padT - padB;
  var pcts = items.map(function (s) { return s.ltProfitPct; }), dols = items.map(function (s) { return s.ltProfitDollar; });
  var ax = pfDualAxis(Math.min.apply(null, pcts.concat([0])), Math.max.apply(null, pcts.concat([0])),
                      Math.min.apply(null, dols.concat([0])), Math.max.apply(null, dols.concat([0])));
  var sYp = function (v) { return padT + plotH * (ax.pMax - v) / (ax.pMax - ax.pMin); };
  var sY = function (v) { return padT + plotH * (ax.dMax - v) / (ax.dMax - ax.dMin); };
  var parts = [];
  parts.push(invText(W / 2, 24, stats.label + ' — Long-term capital-gain profit', 18, '#1f1f1f', 'middle', 700));
  parts.push(invText(W / 2, 44, 'Left bars & axis: profit $   ·   Right bars (faded) & axis: profit %', 12, '#666', 'middle', 400));
  // gridlines at % ticks; left $ label (aligned) + right % label at each
  ax.ticks.forEach(function (tk) {
    var y = sYp(tk), zero = Math.abs(tk) < 1e-9;
    parts.push('<line x1="' + padL + '" y1="' + y.toFixed(1) + '" x2="' + (W - padR) + '" y2="' + y.toFixed(1) + '" stroke="' + (zero ? '#bbb' : '#ededed') + '" stroke-width="1"></line>');
    parts.push(invText(W - padR + 6, y + 3.5, invFmtPct(tk, 0), 10, '#888', 'start', 400));
    var dVal = ax.dMax - (ax.dMax - ax.dMin) * ((y - padT) / plotH);
    parts.push(invText(padL - 6, y + 3.5, invFmtMoney(dVal), 10, '#888', 'end', 400));
  });
  parts.push(invText(padL - 6, padT - 12, '$', 12, '#666', 'end', 700));
  parts.push(invText(W - padR + 6, padT - 12, '%', 12, '#666', 'start', 700));
  var slot = plotW / items.length, bw = Math.min(20, slot * 0.34);
  items.forEach(function (s, i) {
    var cxc = padL + slot * i + slot / 2, fill = pfColor(s.colorIndex);
    var dv = s.ltProfitDollar, x1 = cxc - bw - 1.5, y1t = sY(Math.max(0, dv)), y1b = sY(Math.min(0, dv)), tipD = s.ticker + ' LT profit: ' + invFmtMoney(dv);
    parts.push('<rect x="' + x1.toFixed(1) + '" y="' + y1t.toFixed(1) + '" width="' + bw + '" height="' + Math.max(1, y1b - y1t).toFixed(1) +
               '" rx="2" fill="' + fill + '" data-tip="' + escapeHtml(tipD) + '"></rect>');
    var pv = s.ltProfitPct, x2 = cxc + 1.5, y2t = sYp(Math.max(0, pv)), y2b = sYp(Math.min(0, pv)), tipP = s.ticker + ' LT profit: ' + invFmtPct(pv, 1);
    parts.push('<rect x="' + x2.toFixed(1) + '" y="' + y2t.toFixed(1) + '" width="' + bw + '" height="' + Math.max(1, y2b - y2t).toFixed(1) +
               '" rx="2" fill="' + fill + '" fill-opacity="0.4" stroke="' + fill + '" stroke-width="1" data-tip="' + escapeHtml(tipP) + '"></rect>');
    parts.push(pfXLabel(cxc, H - padB + 14, s.ticker));
  });
  return { width: W, height: H, inner: parts.join('') };
}

// ---------- Hover / tap value tooltip (works on desktop + mobile) ----------
function pfEnsureTip() {
  var el = document.getElementById('pf-tip');
  if (!el) { el = document.createElement('div'); el.id = 'pf-tip'; document.body.appendChild(el); }
  return el;
}
function pfWireTooltip(pageEl) {
  var tip = pfEnsureTip();
  function at(ev) {
    var el = ev.target && ev.target.closest ? ev.target.closest('[data-tip]') : null;
    if (!el) { tip.style.display = 'none'; return; }
    tip.textContent = el.getAttribute('data-tip');
    tip.style.display = 'block';
    tip.style.left = (ev.clientX + 12) + 'px';
    tip.style.top = (ev.clientY + 12) + 'px';
  }
  pageEl.addEventListener('pointermove', at);
  pageEl.addEventListener('pointerdown', at);
  pageEl.addEventListener('pointerleave', function () { tip.style.display = 'none'; });
}

// ---------- page build / load / render ----------
function pfPageHtml(key, label) {
  return '' +
    '<details class="panel" open><summary>Holdings &amp; performance' + pfToolbar(key, 'pie') + '</summary>' +
      '<div class="panel-body"><div class="pf-top">' +
        '<div class="chart-wrap"><svg id="pf-pie-' + key + '" class="chart-svg"></svg></div>' +
        '<div class="pf-stats" id="pf-stats-' + key + '"></div>' +
      '</div></div></details>' +
    '<details class="panel" open><summary>Return % by holding' + pfToolbar(key, 'ret') + '</summary>' +
      '<div class="panel-body"><div class="chart-wrap chart-scroll"><svg id="pf-ret-' + key + '" class="pf-chart"></svg></div></div></details>' +
    '<details class="panel" open><summary>Long-term capital-gain profit ($ / %)' + pfToolbar(key, 'lt') + '</summary>' +
      '<div class="panel-body"><div class="chart-wrap chart-scroll"><svg id="pf-lt-' + key + '" class="pf-chart"></svg></div></div></details>';
}
function pfToolbar(key, chart) {
  return '<span class="chart-toolbar">' +
    '<button class="btn ghost sm" data-pfx="' + key + '|' + chart + '|png">PNG</button>' +
    '<button class="btn ghost sm" data-pfx="' + key + '|' + chart + '|pdf">PDF</button></span>';
}
function portfolioActivate(key) {
  var st = PF[key] || (PF[key] = {});
  if (!st.built) { pfBuildPage(key); st.built = true; }
  if (!st.loaded) pfLoad(key);
}
function pfBuildPage(key) {
  var page = document.getElementById('page-pf-' + key);
  var label = (PAGE_TITLES['pf-' + key] || '').replace(/^·\s*/, '') || key;
  page.innerHTML = pfPageHtml(key, label);
  page.querySelectorAll('[data-pfx]').forEach(function (b) {
    b.addEventListener('click', function () { var p = b.getAttribute('data-pfx').split('|'); pfExport(p[0], p[1], p[2]); });
  });
  pfWireTooltip(page); // hover/tap value tooltip (delegated; survives re-render)
}
function pfLoad(key) {
  google.script.run
    .withSuccessHandler(function (stats) { var st = PF[key] || (PF[key] = {}); st.stats = stats; st.loaded = true; pfRender(key); })
    .withFailureHandler(function (e) { toast('Portfolio load failed: ' + (e && e.message ? e.message : e)); })
    .getPortfolioStats(key);
}
function portfolioReload(key) { pfLoad(key); }
function pfRender(key) {
  var st = PF[key]; if (!st || !st.stats) return; var s = st.stats;
  invApplySvg(document.getElementById('pf-pie-' + key), pfBuildPie(s));
  document.getElementById('pf-stats-' + key).innerHTML = pfStatsHtml(s);
  invApplySvg(document.getElementById('pf-ret-' + key), pfBuildProfitBars(s));
  invApplySvg(document.getElementById('pf-lt-' + key), pfBuildLtBars(s));
}
function pfExport(key, chart, kind) {
  var svg = document.getElementById('pf-' + chart + '-' + key); if (!svg) return;
  var str = serializeSvg(svg, '');
  if (kind === 'png') {
    var vb = (svg.getAttribute('viewBox') || '0 0 1000 600').split(/\s+/);
    exportSvgStringToPng(str, Number(vb[2]) * 1.5, Number(vb[3]) * 1.5, key + '-' + chart + '-' + Date.now() + '.png');
  } else {
    exportSvgStringToPdf(str);
  }
}

// Build a tab + page container for each configured portfolio (called last).
function pfInit() {
  google.script.run
    .withSuccessHandler(function (list) {
      var tabs = document.getElementById('tabs');
      (list || []).forEach(function (p) {
        var page = 'pf-' + p.key;
        if (document.querySelector('.tab[data-page="' + page + '"]')) return;
        var btn = document.createElement('button');
        btn.className = 'tab'; btn.setAttribute('data-page', page); btn.textContent = p.label;
        tabs.appendChild(btn);
        PAGE_TITLES[page] = '· ' + p.label;
        var div = document.createElement('div');
        div.className = 'page'; div.id = 'page-' + page;
        var ps = document.querySelectorAll('.page');
        if (ps.length) ps[ps.length - 1].insertAdjacentElement('afterend', div);
        else document.body.appendChild(div);
      });
    })
    .withFailureHandler(function () {})
    .getPortfolioList();
}
</script>
