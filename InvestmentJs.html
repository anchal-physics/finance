<script>
"use strict";

// =====================  Investment pages (Anchal / Anamika)  =====================

var INV_FONT = '"Open Sans", Arial, sans-serif';
var INV_INVESTORS = ['Anchal', 'Anamika'];

var INV_DEFAULTS = {
  shared: { palette: 'cat10', pctPrecision: 1 },
  pie:    { innerRadiusPct: 48, sliceLabels: true, width: 1140, height: 900 },
  bar:    { showValues: true, width: 1140, height: 705 }
};

var INV = {
  Anchal:  { model: null, editor: null, settings: null, loaded: false, built: false, hash: '' },
  Anamika: { model: null, editor: null, settings: null, loaded: false, built: false, hash: '' }
};
var ACTIVE_PAGE = 'sankey';
var INV_REORDER_WARNED = false;
var invSettingsTimers = {};

// ---------- small formatters / color helpers ----------
function invPalette(name) { return PALETTES[name] || PALETTES['cat10']; }
function invHexToRgb(h) {
  h = String(h).replace('#', '');
  if (h.length === 3) h = h.split('').map(function (c) { return c + c; }).join('');
  return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
}
// amt in [-1,1]: negative = darker, positive = lighter
function invShade(hex, amt) {
  if (!/^#?[0-9a-fA-F]{3,6}$/.test(String(hex))) return hex;
  var rgb = invHexToRgb(hex), t = amt < 0 ? 0 : 255, p = Math.abs(amt);
  var mix = function (c) { return Math.round((t - c) * p + c); };
  return 'rgb(' + mix(rgb[0]) + ',' + mix(rgb[1]) + ',' + mix(rgb[2]) + ')';
}
// true if the fill is dark enough that white label text reads better
function invIsDark(color) {
  var r, g, b, m = /rgb\((\d+),\s*(\d+),\s*(\d+)\)/.exec(String(color));
  if (m) { r = +m[1]; g = +m[2]; b = +m[3]; }
  else { var c = invHexToRgb(color); r = c[0]; g = c[1]; b = c[2]; }
  return (0.299 * r + 0.587 * g + 0.114 * b) < 145;
}
function invFmtPct(frac, prec) { return (Number(frac) * 100).toFixed(prec) + '%'; }
function invFmtER(erPct, prec) { return Number(erPct).toFixed(prec) + '%'; } // already in % units
function invFmtMoney(v) {
  var n = Math.round(Number(v) || 0);
  return '$' + String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}
function invSubtitle(model) {
  var weekly = (model.totalWeekly != null ? model.totalWeekly : model.weeklyBase) || 0;
  return 'Investing ' + invFmtMoney(weekly) + '/week at an effective expense ratio of ' +
         invFmtER(model.effectiveExpenseRatio, 2) + '.';
}

// ---------- SVG geometry ----------
function invPolar(cx, cy, r, ang) { return [cx + r * Math.sin(ang), cy - r * Math.cos(ang)]; }
function invDonutPath(cx, cy, rIn, rOut, a0, a1) {
  var large = (a1 - a0) > Math.PI ? 1 : 0;
  var p0o = invPolar(cx, cy, rOut, a0), p1o = invPolar(cx, cy, rOut, a1);
  var p1i = invPolar(cx, cy, rIn, a1), p0i = invPolar(cx, cy, rIn, a0);
  var f = function (p) { return p[0].toFixed(2) + ',' + p[1].toFixed(2); };
  return 'M' + f(p0o) + 'A' + rOut + ',' + rOut + ' 0 ' + large + ' 1 ' + f(p1o) +
         'L' + f(p1i) + 'A' + rIn + ',' + rIn + ' 0 ' + large + ' 0 ' + f(p0i) + 'Z';
}

// ---------- Pie chart (SVG inner markup) ----------
// Self-contained: categories slightly "exploded" outward, each ticker slice
// labelled INSIDE (symbol + % + $/wk), each category labelled OUTSIDE (name +
// total %). No side legend. Hover <title> gives the full fund name.
function invBuildPie(model, s) {
  var W = 760, H = 600;
  var cx = 380, cy = 312, rOut = 178, rIn = Math.round(rOut * (s.pie.innerRadiusPct / 100));
  var explode = 9;
  var pal = invPalette(s.shared.palette), prec = s.shared.pctPrecision;
  var TWO_PI = Math.PI * 2;
  var parts = [], labels = [];

  parts.push(invText(cx, 28, model.investor + ': allocation in selected strategy', 21, '#1f1f1f', 'middle', 700));
  parts.push(invText(cx, H - 14, invSubtitle(model), 13, '#555', 'middle', 400));

  if (!model.categories.length) {
    parts.push(invText(cx, cy, 'No allocation set for ' + model.investor + '.', 15, '#999', 'middle', 400));
    return { width: W, height: H, inner: parts.join('') };
  }

  var cursor = 0;
  model.categories.forEach(function (cat, ci) {
    var a0 = cursor, a1 = cursor + cat.weightPct * TWO_PI, cmid = (a0 + a1) / 2;
    cursor = a1;
    var base = pal[ci % pal.length];
    // explode this category's whole wedge outward along its bisector
    var ecx = cx + Math.sin(cmid) * explode, ecy = cy - Math.cos(cmid) * explode;
    var n = cat.tickers.length, tcur = a0;
    cat.tickers.forEach(function (tk, ti) {
      var t0 = tcur, t1 = tcur + tk.weightPct * TWO_PI, tmid = (t0 + t1) / 2;
      tcur = t1;
      var shadeAmt = n > 1 ? (-0.16 + (ti / Math.max(1, n - 1)) * 0.40) : 0.04;
      var fill = invShade(base, shadeAmt);
      var tip = tk.symbol + (tk.name ? ' — ' + tk.name : '') + '\n' +
                invFmtPct(tk.weightPct, prec) + ' · ' + invFmtMoney(tk.weekly) + '/wk\n' + cat.name;
      parts.push('<path d="' + invDonutPath(ecx, ecy, rIn, rOut, t0, t1) + '" fill="' + fill +
                 '" stroke="#fff" stroke-width="1.25"><title>' + escapeHtml(tip) + '</title></path>');
      // INSIDE ticker label (drawn on top, after all slices)
      if (s.pie.sliceLabels && (t1 - t0) > 0.05) {
        var p = invPolar(ecx, ecy, (rIn + rOut) / 2, tmid);
        var col = invIsDark(fill) ? '#fff' : '#222';
        labels.push(invText(p[0], p[1] - 2, tk.symbol, 12, col, 'middle', 700));
        labels.push(invText(p[0], p[1] + 11, invFmtPct(tk.weightPct, prec) + ' · ' + invFmtMoney(tk.weekly), 9.5, col, 'middle', 400));
      }
    });
    // OUTSIDE category label (name + total %)
    if (s.pie.sliceLabels) {
      var lp = invPolar(ecx, ecy, rOut + 14, cmid);
      var anchor = Math.sin(cmid) >= -0.05 ? 'start' : 'end';
      var lx = lp[0] + (anchor === 'start' ? 3 : -3);
      labels.push(invText(lx, lp[1] - 1, cat.name, 12.5, '#333', anchor, 700));
      labels.push(invText(lx, lp[1] + 13, invFmtPct(cat.weightPct, prec) + ' · ' + invFmtMoney(cat.weekly) + '/wk', 10.5, '#666', anchor, 400));
    }
  });

  return { width: W, height: H, inner: parts.join('') + labels.join('') };
}

function invText(x, y, str, size, fill, anchor, weight) {
  return '<text x="' + x.toFixed(1) + '" y="' + y.toFixed(1) + '" font-family=\'' + INV_FONT +
         '\' font-size="' + size + '" fill="' + fill + '" text-anchor="' + (anchor || 'start') +
         '" font-weight="' + (weight || 400) + '">' + escapeHtml(str) + '</text>';
}

// ---------- Bar chart (SVG inner markup) ----------
function invBuildBar(model, s) {
  var W = 760, H = 470, padL = 56, padR = 24, padT = 62, padB = 60;
  var plotW = W - padL - padR, plotH = H - padT - padB;
  var prec = s.shared.pctPrecision;
  var pal = invPalette(s.shared.palette);
  var data = [
    ['6 mo', model.weightedReturns.m6], ['1 yr', model.weightedReturns.y1],
    ['3 yr', model.weightedReturns.y3], ['5 yr', model.weightedReturns.y5]
  ];
  var vals = data.map(function (d) { return d[1]; });
  var maxV = Math.max.apply(null, vals.concat([0]));
  var minV = Math.min.apply(null, vals.concat([0]));
  if (maxV === minV) maxV += 0.01;
  var pad = (maxV - minV) * 0.14; maxV += pad; if (minV < 0) minV -= pad;
  var scaleY = function (v) { return padT + plotH * (maxV - v) / (maxV - minV); };
  var zeroY = scaleY(0);
  var parts = [];
  parts.push(invText(W / 2, 30, model.investor + ': Historical growth in selected strategy', 19, '#1f1f1f', 'middle', 700));
  parts.push(invText(W / 2, 50, invSubtitle(model), 13, '#555', 'middle', 400));
  parts.push('<line x1="' + padL + '" y1="' + zeroY.toFixed(1) + '" x2="' + (W - padR) +
             '" y2="' + zeroY.toFixed(1) + '" stroke="#ccc" stroke-width="1"></line>');
  var slot = plotW / data.length, bw = slot * 0.5;
  data.forEach(function (d, i) {
    var v = d[1], x = padL + slot * i + (slot - bw) / 2;
    var yTop = scaleY(Math.max(0, v)), yBot = scaleY(Math.min(0, v));
    var h = Math.max(1, yBot - yTop);
    var color = pal[i % pal.length];
    var tip = d[0] + ' return: ' + invFmtPct(v, prec) + '  (strategy-weighted, total over the period)';
    parts.push('<rect x="' + x.toFixed(1) + '" y="' + yTop.toFixed(1) + '" width="' + bw.toFixed(1) +
               '" height="' + h.toFixed(1) + '" rx="3" fill="' + color + '"><title>' + escapeHtml(tip) + '</title></rect>');
    if (s.bar.showValues) {
      var ly = v >= 0 ? yTop - 7 : yBot + 16;
      parts.push(invText(x + bw / 2, ly, invFmtPct(v, prec), 14, '#333', 'middle', 600));
    }
    parts.push(invText(x + bw / 2, H - padB + 24, d[0], 15, '#444', 'middle', 600));
  });
  parts.push(invText(W / 2, H - 12, 'Total return over each horizon (not annualized).', 12, '#999', 'middle', 400));
  return { width: W, height: H, inner: parts.join('') };
}

// ---------- render orchestration ----------
function invApplySvg(svgEl, built) {
  svgEl.setAttribute('viewBox', '0 0 ' + built.width + ' ' + built.height);
  svgEl.setAttribute('preserveAspectRatio', 'xMidYMid meet');
  svgEl.innerHTML = built.inner;
}
function invRenderCharts(investor) {
  var st = INV[investor];
  if (!st.model) return;
  var s = st.settings;
  invApplySvg(document.getElementById('inv-pie-' + investor), invBuildPie(st.model, s));
  invApplySvg(document.getElementById('inv-bar-' + investor), invBuildBar(st.model, s));
}

// ---------- settings panel ----------
function invSettingsHtml(investor) {
  var paletteOpts = Object.keys(PALETTES).map(function (k) { return '<option value="' + k + '">' + k + '</option>'; }).join('');
  return '' +
    '<div style="font-weight:600;margin-bottom:6px;">Shared</div>' +
    '<div class="settings-grid">' +
      '<div class="setting-row"><label>Category palette</label><select data-s="shared.palette">' + paletteOpts + '</select></div>' +
      '<div class="setting-row"><label>% decimal places</label><input type="number" min="0" max="4" data-s="shared.pctPrecision"></div>' +
    '</div>' +
    '<div style="font-weight:600;margin:12px 0 6px;">Pie</div>' +
    '<div class="settings-grid">' +
      '<div class="setting-row"><label>Inner radius (%)</label><input type="number" min="0" max="90" data-s="pie.innerRadiusPct"></div>' +
      '<div class="setting-row"><label>Show labels</label><input type="checkbox" data-s="pie.sliceLabels"></div>' +
      '<div class="setting-row"><label>Export width</label><input type="number" min="200" data-s="pie.width"></div>' +
      '<div class="setting-row"><label>Export height</label><input type="number" min="200" data-s="pie.height"></div>' +
    '</div>' +
    '<div style="font-weight:600;margin:12px 0 6px;">Bar</div>' +
    '<div class="settings-grid">' +
      '<div class="setting-row"><label>Show values</label><input type="checkbox" data-s="bar.showValues"></div>' +
      '<div class="setting-row"><label>Export width</label><input type="number" min="200" data-s="bar.width"></div>' +
      '<div class="setting-row"><label>Export height</label><input type="number" min="200" data-s="bar.height"></div>' +
    '</div>' +
    '<div style="margin-top:10px;"><button class="btn ghost sm" data-inv-reset="' + investor + '">Reset to defaults</button></div>';
}
function invApplySettingsToUi(investor) {
  var s = INV[investor].settings, root = document.getElementById('inv-settings-' + investor);
  root.querySelectorAll('[data-s]').forEach(function (el) {
    var path = el.getAttribute('data-s').split('.'), v = s[path[0]][path[1]];
    if (el.type === 'checkbox') el.checked = !!v; else el.value = v;
  });
}
function invWireSettings(investor) {
  var root = document.getElementById('inv-settings-' + investor);
  root.innerHTML = invSettingsHtml(investor);
  invApplySettingsToUi(investor);
  root.querySelectorAll('[data-s]').forEach(function (el) {
    var evt = (el.type === 'checkbox' || el.tagName === 'SELECT' || el.type === 'color') ? 'change' : 'input';
    el.addEventListener(evt, function () {
      var path = el.getAttribute('data-s').split('.'), s = INV[investor].settings;
      var val = el.type === 'checkbox' ? el.checked : (el.type === 'number' ? Number(el.value) : el.value);
      s[path[0]][path[1]] = val;
      invRenderCharts(investor);
      invPersistSettings(investor);
    });
  });
  root.querySelector('[data-inv-reset]').addEventListener('click', function () {
    INV[investor].settings = JSON.parse(JSON.stringify(INV_DEFAULTS));
    invApplySettingsToUi(investor);
    invRenderCharts(investor);
    invPersistSettings(investor);
  });
}
function invPersistSettings(investor) {
  if (invSettingsTimers[investor]) clearTimeout(invSettingsTimers[investor]);
  invSettingsTimers[investor] = setTimeout(function () {
    google.script.run.saveNamedSettings('inv:' + investor, JSON.stringify(INV[investor].settings));
  }, 600);
}

// ---------- editor (full parity) ----------
function invRenderEditor(investor) {
  var ed = INV[investor].editor, host = document.getElementById('inv-editor-' + investor);
  if (!ed) { host.innerHTML = '<div class="chart-empty">Loading…</div>'; return; }
  var cols = ed.columns, gridCols = '28px repeat(' + cols.length + ', 1fr) 32px';
  var html = '<div class="inv-grid-head" style="grid-template-columns:' + gridCols + '">' +
             '<div class="col-head"></div>' +
             cols.map(function (c, i) { return '<div class="col-head">' + escapeHtml(ed.headers[i] || c) + '</div>'; }).join('') +
             '<div class="col-head"></div></div>';
  html += '<div id="inv-rows-' + investor + '">';
  ed.rows.forEach(function (row) { html += invRowHtml(investor, row, cols, gridCols); });
  html += '</div>';
  host.innerHTML = html;
  invWireEditor(investor);
}
function invRowHtml(investor, row, cols, gridCols) {
  var cells = cols.map(function (c) { return invCellHtml(investor, row.sheetRow, c, row.cells[c]); }).join('');
  return '<div class="inv-row-grid" draggable="true" data-row="' + row.sheetRow + '" style="grid-template-columns:' + gridCols + '">' +
         '<div class="drag-handle" title="Drag to reorder">⋮⋮</div>' + cells +
         '<button class="delete-btn" title="Clear this row\'s ' + investor + ' cells" data-del="' + row.sheetRow + '">×</button></div>';
}
function invCellHtml(investor, sheetRow, col, cell) {
  cell = cell || { display: '', formula: '', raw: '' };
  var isF = cell.formula && String(cell.formula).charAt(0) === '=';
  var inner = (isF ? '<div class="formula-text">' + escapeHtml(cell.formula) + '</div>' : '') +
              '<div class="display-text">' + escapeHtml(cell.display) + '</div>';
  return '<div class="cell' + (isF ? ' is-formula' : '') + '" data-cell="' + sheetRow + ':' + col + '" tabindex="0">' + inner + '</div>';
}
function invWireEditor(investor) {
  var host = document.getElementById('inv-editor-' + investor);
  host.querySelectorAll('.cell').forEach(function (cellEl) {
    cellEl.addEventListener('click', function () { invBeginEdit(investor, cellEl); });
  });
  host.querySelectorAll('[data-del]').forEach(function (btn) {
    btn.addEventListener('click', function () { invDeleteRow(investor, Number(btn.getAttribute('data-del'))); });
  });
  invWireDrag(investor, host);
}
function invBeginEdit(investor, cellEl) {
  if (cellEl.querySelector('input')) return;
  var key = cellEl.getAttribute('data-cell'), parts = key.split(':');
  var sheetRow = Number(parts[0]), col = parts[1];
  var row = (INV[investor].editor.rows.filter(function (r) { return r.sheetRow === sheetRow; })[0]) || { cells: {} };
  var cell = row.cells[col] || { formula: '', raw: '', display: '' };
  var prefill = (cell.formula && String(cell.formula).charAt(0) === '=') ? cell.formula
              : (cell.raw === null || cell.raw === undefined ? '' : String(cell.raw));
  cellEl.classList.add('editing');
  cellEl.innerHTML = '';
  var input = document.createElement('input');
  input.type = 'text'; input.value = prefill;
  cellEl.appendChild(input); input.focus(); input.select();
  var done = false;
  var commit = function (save) {
    if (done) return; done = true;
    cellEl.classList.remove('editing');
    if (save) invWriteCell(investor, sheetRow, col, input.value);
    else invRenderEditor(investor);
  };
  input.addEventListener('blur', function () { commit(true); });
  input.addEventListener('keydown', function (ev) {
    if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
    else if (ev.key === 'Escape') { ev.preventDefault(); commit(false); }
  });
}
function invWriteCell(investor, sheetRow, col, newText) {
  google.script.run
    .withSuccessHandler(function (resp) {
      var st = INV[investor]; st.hash = resp.hash;
      var row = st.editor.rows.filter(function (r) { return r.sheetRow === sheetRow; })[0];
      if (row) row.cells[col] = { display: resp.cell.display, formula: resp.cell.formula, raw: resp.cell.raw };
      invRenderEditor(investor);
      invReloadModel(investor); // charts depend on the edited cell
    })
    .withFailureHandler(function (e) { toast('Save failed: ' + (e && e.message ? e.message : e)); invRenderEditor(investor); })
    .writeInvestmentCell({ investor: investor, sheetRow: sheetRow, col: col, newText: newText });
}
function invAddRow(investor) {
  google.script.run
    .withSuccessHandler(function (resp) {
      var st = INV[investor]; st.hash = resp.hash;
      st.editor.rows.push(resp.row);
      invRenderEditor(investor);
    })
    .withFailureHandler(function (e) { toast('Add row failed: ' + (e && e.message ? e.message : e)); })
    .appendInvestmentRow(investor);
}
function invDeleteRow(investor, sheetRow) {
  google.script.run
    .withSuccessHandler(function (resp) {
      var st = INV[investor]; st.hash = resp.hash;
      st.editor.rows = st.editor.rows.filter(function (r) { return r.sheetRow !== sheetRow; });
      invRenderEditor(investor);
      invReloadModel(investor);
    })
    .withFailureHandler(function (e) { toast('Clear row failed: ' + (e && e.message ? e.message : e)); })
    .clearInvestmentRow({ investor: investor, sheetRow: sheetRow });
}
var invDragRow = null;
function invWireDrag(investor, host) {
  host.querySelectorAll('.inv-row-grid').forEach(function (rowEl) {
    rowEl.addEventListener('dragstart', function () { invDragRow = Number(rowEl.getAttribute('data-row')); rowEl.classList.add('is-dragging'); });
    rowEl.addEventListener('dragend', function () { rowEl.classList.remove('is-dragging'); host.querySelectorAll('.inv-row-grid').forEach(function (r) { r.classList.remove('drag-over-above', 'drag-over-below'); }); });
    rowEl.addEventListener('dragover', function (ev) {
      ev.preventDefault();
      var tgt = Number(rowEl.getAttribute('data-row'));
      rowEl.classList.toggle('drag-over-above', invDragRow > tgt);
      rowEl.classList.toggle('drag-over-below', invDragRow < tgt);
    });
    rowEl.addEventListener('dragleave', function () { rowEl.classList.remove('drag-over-above', 'drag-over-below'); });
    rowEl.addEventListener('drop', function (ev) {
      ev.preventDefault();
      var toRow = Number(rowEl.getAttribute('data-row'));
      if (invDragRow && invDragRow !== toRow) invMoveRow(investor, invDragRow, toRow);
      invDragRow = null;
    });
  });
}
function invMoveRow(investor, fromRow, toRow) {
  if (!INV_REORDER_WARNED) {
    INV_REORDER_WARNED = true;
    if (!window.confirm('Reordering moves the entire spreadsheet row, so BOTH investors\' columns move together. Continue?')) {
      return;
    }
    google.script.run.setReorderAck();
  }
  google.script.run
    .withSuccessHandler(function (resp) { INV[investor].hash = resp.hash; invReload(investor); })
    .withFailureHandler(function (e) { toast('Reorder failed: ' + (e && e.message ? e.message : e)); })
    .moveInvestmentRow(investor, fromRow, toRow);
}

// ---------- export per chart ----------
function invExport(investor, chart, kind) {
  var st = INV[investor]; if (!st.model) return;
  var svgEl = document.getElementById('inv-' + chart + '-' + investor);
  var svgStr = serializeSvg(svgEl, '');
  var dims = st.settings[chart];
  if (kind === 'png') exportSvgStringToPng(svgStr, dims.width, dims.height, investor + '-' + chart + '-' + Date.now() + '.png');
  else exportSvgStringToPdf(svgStr);
}

// ---------- page build + lazy load ----------
function invPageHtml(investor) {
  return '' +
    '<details class="panel" open><summary>Allocation' +
      '<span class="chart-toolbar">' +
        '<button class="btn ghost sm" data-x="' + investor + '|pie|png">PNG</button>' +
        '<button class="btn ghost sm" data-x="' + investor + '|pie|pdf">PDF</button>' +
      '</span></summary>' +
      '<div class="panel-body"><div class="chart-wrap"><svg id="inv-pie-' + investor + '" class="chart-svg"></svg></div></div></details>' +
    '<details class="panel" open><summary>Historical growth rate' +
      '<span class="chart-toolbar">' +
        '<button class="btn ghost sm" data-x="' + investor + '|bar|png">PNG</button>' +
        '<button class="btn ghost sm" data-x="' + investor + '|bar|pdf">PDF</button>' +
      '</span></summary>' +
      '<div class="panel-body"><div class="chart-wrap"><svg id="inv-bar-' + investor + '" class="chart-svg"></svg></div></div></details>' +
    '<details class="panel"><summary>Chart settings</summary>' +
      '<div class="panel-body" id="inv-settings-' + investor + '"></div></details>' +
    '<details class="panel"><summary>' + investor + ' data editor</summary>' +
      '<div class="panel-body"><div id="inv-editor-' + investor + '"><div class="chart-empty">Loading…</div></div>' +
        '<div style="margin-top:10px;"><button class="btn ghost sm" data-addrow="' + investor + '">+ Add row</button></div>' +
      '</div></details>';
}
function invBuildPage(investor) {
  var page = document.getElementById('page-' + investor.toLowerCase());
  page.innerHTML = invPageHtml(investor);
  invWireSettings(investor);
  page.querySelectorAll('[data-x]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var p = btn.getAttribute('data-x').split('|'); invExport(p[0], p[1], p[2]);
    });
  });
  page.querySelector('[data-addrow]').addEventListener('click', function () { invAddRow(investor); });
  INV[investor].built = true;
}
function invLoad(investor) {
  google.script.run
    .withSuccessHandler(function (model) {
      var st = INV[investor]; st.model = model; st.hash = model.hash; st.loaded = true;
      invRenderCharts(investor);
    })
    .withFailureHandler(function (e) { toast('Load failed: ' + (e && e.message ? e.message : e)); })
    .getInvestmentData(investor);
  google.script.run
    .withSuccessHandler(function (editor) { INV[investor].editor = editor; INV[investor].hash = editor.hash; invRenderEditor(investor); })
    .withFailureHandler(function (e) { toast('Editor load failed: ' + (e && e.message ? e.message : e)); })
    .getInvestmentEditor(investor);
}
function invReload(investor) {
  invLoad(investor);
}
function invReloadModel(investor) {
  google.script.run
    .withSuccessHandler(function (model) { INV[investor].model = model; INV[investor].hash = model.hash; invRenderCharts(investor); })
    .withFailureHandler(function () {})
    .getInvestmentData(investor);
}
function invLoadSettings(investor, cb) {
  google.script.run
    .withSuccessHandler(function (saved) {
      var d = JSON.parse(JSON.stringify(INV_DEFAULTS));
      if (saved && typeof saved === 'object') {
        ['shared', 'pie', 'bar'].forEach(function (g) { if (saved[g]) for (var k in saved[g]) d[g][k] = saved[g][k]; });
      }
      INV[investor].settings = d;
      cb();
    })
    .withFailureHandler(function () { INV[investor].settings = JSON.parse(JSON.stringify(INV_DEFAULTS)); cb(); })
    .getNamedSettings('inv:' + investor);
}

// ---------- tab navigation ----------
function invActivatePage(page) {
  ACTIVE_PAGE = page;
  ['sankey', 'anchal', 'anamika'].forEach(function (p) {
    var el = document.getElementById('page-' + p);
    if (el) el.classList.toggle('active', p === page);
  });
  document.querySelectorAll('.tab').forEach(function (t) { t.classList.toggle('active', t.getAttribute('data-page') === page); });
  document.getElementById('tabs').classList.remove('open');
  document.getElementById('hamburger').setAttribute('aria-expanded', 'false');
  document.getElementById('sankey-export').style.display = (page === 'sankey') ? 'inline-flex' : 'none';
  var titles = { sankey: '· Payroll Sankey', anchal: '· Anchal Investment Strategy', anamika: '· Anamika Investment Strategy' };
  document.getElementById('page-title').textContent = titles[page] || '· Payroll Sankey';

  if (page === 'anchal' || page === 'anamika') {
    var investor = page === 'anchal' ? 'Anchal' : 'Anamika';
    var st = INV[investor];
    if (!st.built) {
      if (!st.settings) { invLoadSettings(investor, function () { invBuildPage(investor); invLoad(investor); }); }
      else { invBuildPage(investor); invLoad(investor); }
    }
  }
}
document.querySelectorAll('.tab').forEach(function (t) {
  t.addEventListener('click', function () { invActivatePage(t.getAttribute('data-page')); });
});
document.getElementById('hamburger').addEventListener('click', function () {
  var tabs = document.getElementById('tabs'), open = tabs.classList.toggle('open');
  this.setAttribute('aria-expanded', open ? 'true' : 'false');
});

// ---------- investment polling (active investor page only) ----------
function invStartPolling() {
  setInterval(function () {
    if (ACTIVE_PAGE !== 'anchal' && ACTIVE_PAGE !== 'anamika') return;
    var investor = ACTIVE_PAGE === 'anchal' ? 'Anchal' : 'Anamika';
    var st = INV[investor];
    if (!st.loaded || !st.hash) return;
    // skip if a cell is mid-edit
    if (document.querySelector('#page-' + ACTIVE_PAGE + ' .cell input')) return;
    google.script.run
      .withSuccessHandler(function (resp) {
        if (!resp.changed) return;
        st.hash = resp.hash; st.model = resp.model; st.editor = resp.editor;
        invRenderCharts(investor); invRenderEditor(investor);
        toast(investor + ' data updated from the sheet.');
      })
      .withFailureHandler(function () {})
      .pollInvestment(investor, st.hash);
  }, POLL_INTERVAL_MS);
}
</script>
